<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>apriday-self-Improving 自动化演示</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --surface: #ffffff;
      --surface-soft: #f9fbfd;
      --text: #162033;
      --muted: #657185;
      --line: #dbe3ee;
      --blue: #1769e0;
      --green: #13864e;
      --red: #c74444;
      --orange: #c96418;
      --violet: #6849c9;
      --teal: #0e7c86;
      --radius: 8px;
      --shadow: 0 10px 26px rgba(20, 34, 57, .08);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
      letter-spacing: 0;
    }

    button, input { font: inherit; }

    .page {
      max-width: 1500px;
      margin: 0 auto;
      padding: 22px;
    }

    header {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 18px;
      align-items: start;
      margin-bottom: 14px;
    }

    h1 {
      margin: 0;
      font-size: 28px;
      line-height: 1.2;
    }

    .sub {
      margin-top: 8px;
      color: var(--muted);
      line-height: 1.55;
      max-width: 920px;
      font-size: 14px;
    }

    .toolbar {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
      align-items: center;
    }

    .btn {
      min-height: 38px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
      color: var(--text);
      padding: 0 12px;
      cursor: pointer;
      font-weight: 800;
    }

    .btn.primary {
      background: var(--blue);
      color: #fff;
      border-color: var(--blue);
    }

    .btn:disabled {
      cursor: not-allowed;
      opacity: .55;
    }

    .speed {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      font-size: 13px;
      white-space: nowrap;
    }

    .speed input { width: 120px; }

    .summary {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 14px;
    }

    .stat, .panel, .industry-btn, .memory-row, .step-row, .score-row {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .stat {
      min-height: 86px;
      padding: 12px;
      display: grid;
      align-content: space-between;
    }

    .stat-label {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
    }

    .stat-value {
      font-size: 25px;
      font-weight: 900;
      line-height: 1.1;
    }

    .layout {
      display: grid;
      grid-template-columns: 330px minmax(0, 1fr);
      gap: 14px;
      align-items: start;
    }

    .panel {
      padding: 15px;
    }

    .panel h2 {
      margin: 0 0 12px;
      font-size: 17px;
      line-height: 1.3;
    }

    .industry-list {
      display: grid;
      gap: 8px;
    }

    .industry-btn {
      text-align: left;
      padding: 12px;
      cursor: pointer;
      box-shadow: none;
      display: grid;
      gap: 8px;
      width: 100%;
    }

    .industry-btn.active {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px #e5efff;
    }

    .industry-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
    }

    .industry-name {
      font-weight: 900;
      line-height: 1.25;
    }

    .industry-score {
      color: var(--blue);
      font-weight: 900;
      white-space: nowrap;
    }

    .meta {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      padding: 2px 8px;
      border-radius: 999px;
      background: #edf4ff;
      color: var(--blue);
      font-size: 12px;
      font-weight: 800;
      line-height: 1.2;
    }

    .chip.green { background: #e8f7ef; color: var(--green); }
    .chip.orange { background: #fff1e5; color: var(--orange); }
    .chip.red { background: #fff0f0; color: var(--red); }
    .chip.violet { background: #f1edff; color: var(--violet); }
    .chip.teal { background: #e8f7f8; color: var(--teal); }
    .chip.gray { background: #eef2f6; color: #59677c; }

    .scenario-head {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 14px;
      align-items: start;
      margin-bottom: 12px;
    }

    .scenario-title {
      margin: 0;
      font-size: 22px;
      line-height: 1.25;
    }

    .scenario-goal {
      margin-top: 7px;
      color: var(--muted);
      line-height: 1.5;
      font-size: 14px;
    }

    .live-score {
      min-width: 124px;
      text-align: center;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 10px;
      background: var(--surface-soft);
    }

    .live-score strong {
      display: block;
      font-size: 30px;
      line-height: 1;
      color: var(--blue);
    }

    .grid {
      display: grid;
      grid-template-columns: minmax(0, 1.35fr) minmax(320px, .9fr);
      gap: 12px;
      align-items: start;
    }

    .stage {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface-soft);
      padding: 12px;
      margin-bottom: 12px;
    }

    .stage-title {
      font-size: 13px;
      color: var(--muted);
      font-weight: 800;
      margin-bottom: 8px;
    }

    .terminal {
      min-height: 108px;
      border-radius: var(--radius);
      background: #111827;
      color: #e8f0ff;
      padding: 12px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 12px;
      line-height: 1.55;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
    }

    .step-list {
      display: grid;
      gap: 8px;
    }

    .step-row {
      box-shadow: none;
      padding: 10px;
      display: grid;
      grid-template-columns: 32px minmax(0, 1fr) auto;
      gap: 10px;
      align-items: center;
    }

    .step-index {
      width: 30px;
      height: 30px;
      border-radius: 999px;
      display: grid;
      place-items: center;
      background: #eef2f6;
      color: #59677c;
      font-weight: 900;
      font-size: 12px;
    }

    .step-row.done .step-index {
      background: #e8f7ef;
      color: var(--green);
    }

    .step-row.active {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px #e5efff;
    }

    .step-title {
      font-weight: 900;
      line-height: 1.3;
      margin-bottom: 3px;
    }

    .step-body {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.4;
    }

    .memory-list, .score-list {
      display: grid;
      gap: 8px;
    }

    .memory-row {
      box-shadow: none;
      padding: 10px;
    }

    .memory-top, .score-top {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      align-items: center;
      margin-bottom: 7px;
    }

    .memory-id {
      font-weight: 900;
      color: var(--blue);
      font-size: 13px;
    }

    .memory-content {
      line-height: 1.45;
      font-size: 13px;
    }

    .empty {
      border: 1px dashed var(--line);
      border-radius: var(--radius);
      color: var(--muted);
      padding: 12px;
      background: var(--surface-soft);
      font-size: 13px;
      line-height: 1.45;
    }

    .score-row {
      box-shadow: none;
      padding: 10px;
    }

    .score-name {
      font-weight: 900;
      font-size: 13px;
    }

    .score-num {
      font-weight: 900;
      color: var(--blue);
      white-space: nowrap;
    }

    .bar {
      height: 8px;
      border-radius: 999px;
      overflow: hidden;
      background: #e7edf5;
    }

    .bar span {
      display: block;
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--blue), var(--green));
      transition: width .25s ease;
    }

    .comparison {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
      margin-top: 12px;
    }

    .compare-item {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 10px;
      background: var(--surface-soft);
      min-height: 92px;
    }

    .compare-item strong {
      display: block;
      margin-bottom: 6px;
      font-size: 13px;
    }

    .compare-item p {
      margin: 0;
      color: var(--muted);
      line-height: 1.45;
      font-size: 12px;
    }

    @media (max-width: 1120px) {
      header, .layout, .grid, .scenario-head {
        grid-template-columns: 1fr;
      }

      .toolbar {
        justify-content: flex-start;
      }

      .summary {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 720px) {
      .page {
        padding: 14px;
      }

      .summary, .comparison {
        grid-template-columns: 1fr;
      }

      .step-row {
        grid-template-columns: 32px minmax(0, 1fr);
      }

      .step-row .chip {
        grid-column: 2;
        justify-self: start;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <header>
      <div>
        <h1>apriday-self-Improving 自动化演示</h1>
        <div class="sub">跨行业验证同一个自我进化 Skill：每个案例都会自动执行 reset、记忆写入、记忆应用、偏好更新、删除复测，并按赛事六维标准实时评分。</div>
      </div>
      <div class="toolbar">
        <button class="btn primary" id="run-all">运行全部案例</button>
        <button class="btn" id="run-current">运行当前案例</button>
        <button class="btn" id="reset-current">重置当前案例</button>
        <label class="speed">速度 <input id="speed" type="range" min="350" max="1600" step="50" value="800" /></label>
      </div>
    </header>

    <section class="summary" aria-label="演示概览">
      <div class="stat"><div class="stat-label">行业案例</div><div class="stat-value" id="stat-cases">0</div></div>
      <div class="stat"><div class="stat-label">平均分</div><div class="stat-value" id="stat-average">0</div></div>
      <div class="stat"><div class="stat-label">已完成演示</div><div class="stat-value" id="stat-finished">0</div></div>
      <div class="stat"><div class="stat-label">记忆动作覆盖</div><div class="stat-value" id="stat-actions">0/5</div></div>
      <div class="stat"><div class="stat-label">当前阶段</div><div class="stat-value" id="stat-stage">待运行</div></div>
    </section>

    <section class="layout">
      <aside class="panel">
        <h2>行业与案例</h2>
        <div class="industry-list" id="industry-list"></div>
      </aside>

      <section class="panel">
        <div class="scenario-head">
          <div>
            <h2 class="scenario-title" id="scenario-title"></h2>
            <div class="scenario-goal" id="scenario-goal"></div>
            <div class="chips" id="scenario-tags" style="margin-top: 10px;"></div>
          </div>
          <div class="live-score">
            <strong id="live-score">0</strong>
            <div class="meta">本次自动评分</div>
          </div>
        </div>

        <div class="grid">
          <section>
            <div class="stage">
              <div class="stage-title">当前自动化命令</div>
              <div class="terminal" id="terminal">等待运行...</div>
            </div>

            <h2>演示流程</h2>
            <div class="step-list" id="step-list"></div>

            <div class="comparison" id="comparison"></div>
          </section>

          <aside>
            <h2>记忆账本</h2>
            <div class="memory-list" id="memory-list"></div>
            <h2 style="margin-top: 14px;">六维评分</h2>
            <div class="score-list" id="score-list"></div>
          </aside>
        </div>
      </section>
    </section>
  </main>

  <script>
    const dimensions = [
      ["repro", "可复测性", 10],
      ["extract", "有效记忆提取", 20],
      ["apply", "记忆应用效果", 25],

    const scenarios = [

      {

      {

      {

        deleteTarget: "根因复盘",

    const state = {
      selected: 0,
      running: false,
      results: {},
      memories: [],
      activeStep: -1,
      completed: new Set()
    };

    const el = {
      list: document.getElementById("industry-list"),
      title: document.getElementById("scenario-title"),
      goal: document.getElementById("scenario-goal"),
      tags: document.getElementById("scenario-tags"),
      liveScore: document.getElementById("live-score"),
      terminal: document.getElementById("terminal"),
      steps: document.getElementById("step-list"),
      memory: document.getElementById("memory-list"),
      scores: document.getElementById("score-list"),
      comparison: document.getElementById("comparison"),
      statCases: document.getElementById("stat-cases"),
      statAverage: document.getElementById("stat-average"),
      statFinished: document.getElementById("stat-finished"),

      statStage: document.getElementById("stat-stage"),

      resetCurrent: document.getElementById("reset-current"),
      speed: document.getElementById("speed")

    function stepsFor(scenario) {
      return [
        {
          key: "reset",
          label: "Reset",
          desc: "清空记忆，从 M0 空白状态开始。",
          cmd: `python3 scripts/apriday_self_improving.py reset`,
          action: () => {
            state.memories = [];
            return { repro: 10, extract: 0, apply: 0, update: 0, control: 5, quality: 0 };
          }
        },
        {
          key: "write",
          label: "记忆写入",
          desc: "保存用户授权的长期偏好，并记录证据和 scope。",
          cmd: `python3 scripts/apriday_self_improving.py observe "${scenario.memory}" --approve`,
          action: () => {
            state.memories.push(memoryItem("mem_0001", "active", "workflow_rule", scenario.memory, []));
            return { repro: 10, extract: 20, apply: 0, update: 0, control: 8, quality: 3 };
          }
        },
        {
          key: "apply",
          label: "记忆应用",
          desc: "第二个相似任务主动应用 active memory，减少重复说明。",
          cmd: `python3 scripts/apriday_self_improving.py apply "${scenario.apply}"`,
          action: () => ({ repro: 10, extract: 20, apply: 25, update: 0, control: 8, quality: 9 })
        },
        {
          key: "update",
          label: "更新淘汰",
          desc: "用户偏好变化后，新记忆生效，旧记忆 superseded。",
          cmd: `python3 scripts/apriday_self_improving.py observe "${scenario.update}" --approve`,
          action: () => {
            state.memories = state.memories.map(item => item.id === "mem_0001" ? { ...item, status: "superseded" } : item);
            state.memories.push(memoryItem("mem_0002", "active", "workflow_rule", scenario.update, ["mem_0001"]));
            return { repro: 10, extract: 20, apply: 25, update: 20, control: 9, quality: 13 };
          }
        },
        {
          key: "delete",
          label: "删除复测",
          desc: "删除当前 active memory，并验证后续任务不再使用它。",
          cmd: `python3 scripts/apriday_self_improving.py delete mem_0002`,
          action: () => {
            state.memories = state.memories.map(item => item.id === "mem_0002" ? { ...item, status: "deleted" } : item);
            return { repro: 10, extract: 20, apply: 25, update: 20, control: 10, quality: 13 };
          }
        },
        {
          key: "score",
          label: "自动评分",
          desc: "按赛事六维标准汇总本案例得分。",
          cmd: `python3 scripts/apriday_self_improving.py evaluate --case ${scenario.id}`,
          action: () => ({ repro: 10, extract: 20, apply: 25, update: 20, control: 10, quality: qualityScore(scenario.id) })
        }
      ];
    }

    function qualityScore(id) {
      const scores = {
        healthcare: 14,
        education: 14,
        finance: 13,
        retail: 14,
        legal: 13,
        software: 15,
        manufacturing: 14
      };
      return scores[id] || 13;
    }

    function memoryItem(id, status, type, content, supersedes) {
      return {
        id,
        status,
        type,
        content: content.replace(/[。.!！]$/, ""),
        scope: "industry_workflow",
        confidence: 0.92,
        supersedes
      };
    }

    function totalScore(scores) {
      return dimensions.reduce((sum, [key]) => sum + (scores[key] || 0), 0);
    }

    function render() {
      const scenario = scenarios[state.selected];
      const result = state.results[scenario.id] || { scores: {}, total: 0 };

      el.statCases.textContent = scenarios.length;
      el.statFinished.textContent = state.completed.size;
      const totals = Object.values(state.results).map(item => item.total).filter(Boolean);
      el.statAverage.textContent = totals.length ? Math.round(totals.reduce((a, b) => a + b, 0) / totals.length) : 0;
      el.statActions.textContent = actionCoverage();

      renderIndustryList();
      el.title.textContent = `${scenario.industry}：${scenario.title}`;
      el.goal.textContent = scenario.goal;
      el.tags.innerHTML = scenario.tags.map((tag, index) => `<span class="chip ${chipColor(index)}">${tag}</span>`).join("");
      el.liveScore.textContent = result.total || 0;
      renderSteps();
      renderMemory();
      renderScores(result.scores || {});
      renderComparison(scenario);
    }

    function renderIndustryList() {
      el.list.innerHTML = scenarios.map((scenario, index) => {
        const result = state.results[scenario.id];
        const active = index === state.selected ? " active" : "";
        const score = result ? `${result.total}/100` : "待运行";
        return `
          <button class="industry-btn${active}" data-index="${index}" type="button">
            <span class="industry-head">
              <span class="industry-name">${scenario.industry}</span>
              <span class="industry-score">${score}</span>
            </span>
            <span class="meta">${scenario.title}</span>
            <span class="chips">${scenario.tags.slice(0, 2).map((tag, i) => `<span class="chip ${chipColor(i)}">${tag}</span>`).join("")}</span>
          </button>
        `;
      }).join("");
      document.querySelectorAll(".industry-btn").forEach(button => {
        button.addEventListener("click", () => {
          if (state.running) return;
          state.selected = Number(button.dataset.index);
          resetVisualOnly();
          render();
        });
      });
    }

    function renderSteps() {
      const scenario = scenarios[state.selected];
      const steps = stepsFor(scenario);
      el.steps.innerHTML = steps.map((step, index) => {
        const done = index < state.activeStep ? " done" : "";
        const active = index === state.activeStep ? " active" : "";
        const label = index < state.activeStep ? "完成" : index === state.activeStep ? "运行中" : "等待";
        const chip = index < state.activeStep ? "green" : index === state.activeStep ? "orange" : "gray";
        return `
          <div class="step-row${done}${active}">
            <div class="step-index">${index + 1}</div>
            <div>
              <div class="step-title">${step.label}</div>
              <div class="step-body">${step.desc}</div>
            </div>
            <span class="chip ${chip}">${label}</span>
          </div>
        `;
      }).join("");
    }

    function renderMemory() {
      if (!state.memories.length) {
        el.memory.innerHTML = `<div class="empty">M0 空白状态。运行写入步骤后，这里会显示可查看、可解释、可删除的结构化记忆。</div>`;
        return;
      }
      el.memory.innerHTML = state.memories.map(item => `
        <div class="memory-row">
          <div class="memory-top">
            <span class="memory-id">${item.id}</span>
            <span class="chip ${statusColor(item.status)}">${item.status}</span>
          </div>
          <div class="memory-content">${item.content}</div>
          <div class="meta" style="margin-top: 7px;">${item.type} · ${item.scope} · confidence ${item.confidence}${item.supersedes.length ? ` · supersedes ${item.supersedes.join(", ")}` : ""}</div>
        </div>
      `).join("");
    }

    function renderScores(scores) {
      el.scores.innerHTML = dimensions.map(([key, name, max]) => {
        const value = scores[key] || 0;
        return `
          <div class="score-row">
            <div class="score-top">
              <span class="score-name">${name}</span>
              <span class="score-num">${value}/${max}</span>
            </div>
            <div class="bar"><span style="width:${Math.round(value / max * 100)}%"></span></div>
          </div>
        `;
      }).join("");
    }

    function renderComparison(scenario) {
      el.comparison.innerHTML = `
        <div class="compare-item"><strong>M0 首次使用</strong><p>${scenario.before}</p></div>
        <div class="compare-item"><strong>M1/M2 持续使用</strong><p>${scenario.after}</p></div>
        <div class="compare-item"><strong>删除后复测</strong><p>${scenario.deleted}</p></div>
      `;
    }

    function chipColor(index) {
      return ["teal", "violet", "orange", "green"][index % 4];
    }

    function statusColor(status) {
      if (status === "active") return "green";
      if (status === "superseded") return "orange";
      if (status === "deleted") return "red";
      return "gray";
    }

    function actionCoverage() {
      const actionKeys = new Set();
      Object.values(state.results).forEach(result => {
        (result.actions || []).forEach(action => actionKeys.add(action));
      });
      return `${actionKeys.size}/5`;
    }

    function resetVisualOnly() {
      state.memories = [];
      state.activeStep = -1;
      el.terminal.textContent = "等待运行...";
      el.statStage.textContent = "待运行";
    }

    function sleep(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    async function runScenario(index) {
      state.selected = index;
      state.running = true;
      setButtons(false);
      resetVisualOnly();
      render();

      const scenario = scenarios[index];
      const steps = stepsFor(scenario);
      let latestScores = {};
      const actions = ["reset", "write", "apply", "update", "delete"];

      for (let i = 0; i < steps.length; i++) {
        const step = steps[i];
        state.activeStep = i;
        el.statStage.textContent = step.label;
        el.terminal.textContent = `$ ${step.cmd}\n\n${terminalOutput(step.key, scenario)}`;
        latestScores = step.action();
        state.results[scenario.id] = {
          scores: latestScores,
          total: totalScore(latestScores),
          actions: actions.slice(0, Math.min(i + 1, actions.length))
        };
        render();
        await sleep(Number(el.speed.value));
      }

      state.activeStep = steps.length;
      state.completed.add(scenario.id);
      el.statStage.textContent = "评分完成";
      el.terminal.textContent += `\n\nscore.total = ${state.results[scenario.id].total}/100`;
      render();
      state.running = false;
      setButtons(true);
    }

    function terminalOutput(key, scenario) {
      if (key === "reset") return JSON.stringify({ ok: true, memory_state: "M0", memories: [] }, null, 2);
      if (key === "write") return JSON.stringify({ saved: true, id: "mem_0001", status: "active", evidence: scenario.memory }, null, 2);
      if (key === "apply") return JSON.stringify({ used_memory_ids: ["mem_0001"], user_effort_reduction: "medium", task: scenario.apply }, null, 2);
      if (key === "update") return JSON.stringify({ saved: true, id: "mem_0002", status: "active", superseded: ["mem_0001"] }, null, 2);
      if (key === "delete") return JSON.stringify({ ok: true, id: "mem_0002", status: "deleted", after_delete_used_memory_ids: [] }, null, 2);
      return JSON.stringify({ rubric: "WASC six-dimension score", case: scenario.id }, null, 2);
    }

    async function runAll() {
      for (let i = 0; i < scenarios.length; i++) {
        await runScenario(i);
        await sleep(180);
      }
    }

    function setButtons(enabled) {
      el.runAll.disabled = !enabled;
      el.runCurrent.disabled = !enabled;
      el.resetCurrent.disabled = !enabled;
    }

    el.runAll.addEventListener("click", runAll);
    el.runCurrent.addEventListener("click", () => runScenario(state.selected));
    el.resetCurrent.addEventListener("click", () => {
      delete state.results[scenarios[state.selected].id];
      state.completed.delete(scenarios[state.selected].id);
      resetVisualOnly();
      render();
    });

    render();
  </script>
</body>
</html>
