function pct(v,max) { return Math.max(0, Math.min(100, Math.round(v/max*100))); }
function render() {

function memoryJourney(c) {
  const turns = (c.user_effort && c.user_effort.turns) || [];
  if (!turns.length) return [{state:'M0', title:'无费力度轨迹', reason:'未生成用户费力度分析。', effort_score:85, effort_level:'高'}];
